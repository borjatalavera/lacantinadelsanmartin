<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - La Cantina del San Martín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F9F6F0; }
        .cantina-red { color: #BD0A0A; }
        .bg-cantina-red { background-color: #BD0A0A; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Panel de Administración</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
            </div>
            <button onclick="login()" class="w-full bg-cantina-red text-white py-2 rounded-lg font-bold hover:bg-opacity-90">Entrar</button>
            <p id="error-msg" class="text-red-500 text-sm hidden">Contraseña incorrecta</p>
        </div>
    </div>

    <div id="admin-panel" class="hidden max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Gestionar Carta</h1>
            <div class="flex gap-4">
                <button onclick="saveChanges()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700">
                    <i class="fas fa-save mr-2"></i>Descargar menu.json actualizado
                </button>
                <button onclick="logout()" class="text-gray-500 hover:text-red-500">Cerrar Sesión</button>
            </div>
        </div>

        <div id="categories-container" class="space-y-12">
            <!-- Cargando... -->
        </div>
    </div>

    <script>
        let menuData = null;

        function login() {
            const pass = document.getElementById('password').value;
            if (pass === 'admin123') { // Contraseña de ejemplo
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadMenu();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function logout() {
            location.reload();
        }

        async function loadMenu() {
            try {
                const response = await fetch('menu.json');
                menuData = await response.json();
                renderAdminMenu();
            } catch (e) {
                alert('Error al cargar menu.json');
            }
        }

        function renderAdminMenu() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            for (const category in menuData) {
                const catDiv = document.createElement('div');
                catDiv.className = 'bg-white rounded-2xl shadow-sm overflow-hidden';
                
                catDiv.innerHTML = `
                    <div class="bg-gray-100 px-6 py-4 border-b flex justify-between items-center">
                        <h2 class="text-xl font-bold uppercase tracking-wider">${category}</h2>
                    </div>
                    <div class="p-6">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-gray-500 text-sm">
                                    <th class="pb-4">Nombre</th>
                                    <th class="pb-4">Descripción</th>
                                    <th class="pb-4 w-32">Precio ($)</th>
                                </tr>
                            </thead>
                            <tbody id="items-${category.replace(/\s+/g, '-')}">
                            </tbody>
                        </table>
                    </div>
                `;

                const tbody = catDiv.querySelector('tbody text-left'); // Fix later
                const itemsContainer = catDiv.querySelector(`#items-${category.replace(/\s+/g, '-')}`);
                
                menuData[category].forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-t';
                    tr.innerHTML = `
                        <td class="py-4 pr-4">
                            <input type="text" value="${item.nombre}" onchange="updateItem('${category}', ${index}, 'nombre', this.value)" 
                                class="w-full p-2 border rounded focus:ring-1 focus:ring-red-500 outline-none">
                        </td>
                        <td class="py-4 pr-4">
                            <textarea onchange="updateItem('${category}', ${index}, 'descripcion', this.value)" 
                                class="w-full p-2 border rounded focus:ring-1 focus:ring-red-500 outline-none text-sm">${item.descripcion}</textarea>
                        </td>
                        <td class="py-4">
                            <input type="number" value="${item.precio}" onchange="updateItem('${category}', ${index}, 'precio', this.value)" 
                                class="w-full p-2 border rounded focus:ring-1 focus:ring-red-500 outline-none">
                        </td>
                    `;
                    itemsContainer.appendChild(tr);
                });

                container.appendChild(catDiv);
            }
        }

        function updateItem(category, index, field, value) {
            if (field === 'precio') value = parseInt(value);
            menuData[category][index][field] = value;
        }

        function saveChanges() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(menuData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "menu.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            
            alert('Se ha descargado el archivo menu.json actualizado.\n\nPara aplicar los cambios, debes reemplazar el archivo "menu.json" actual por este que acabas de descargar.');
        }
    </script>
</body>
</html>
